<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Hobby Collection Showcase</title>
    <meta name="description" content="Explore my collection of model kits and hobby projects." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Hobby Collection Showcase" />
    <meta
      property="og:description"
      content="Explore my collection of model kits and hobby projects."
    />
    <meta property="og:image" content="https://hobby.iotatfan.com/favicon.png" />
    <meta property="og:url" content="https://hobby.iotatfan.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hobby Collection Showcase" />
    <meta
      name="twitter:description"
      content="Explore my collection of model kits and hobby projects."
    />
    <meta name="twitter:image" content="https://hobby.iotatfan.com/favicon.png" />

    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          const decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <title>Hobby Collection</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
